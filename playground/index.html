<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <!-- Theme colors -->
  <div class="text-dark-gray-50 bg-green-600 text-stroke-4 text-stroke-dark-gray-50">
  </div>

  <!-- Container query -->
  <div class="@container @[200px]:bg-white @[>200px]:bg-white @[<=200px]:bg-white"></div>

  <!-- Utils -->
  <div
    class="max-size-5 flex-center min-size-[100px] col-end-span-1 row-end-span-1 leading-5 area-[1/1] h-stretch w-stretch size-stretch">
  </div>

  <!-- Custom variants -->
  <div
    class="preceding:bg-red-500 hover:following:bg-red-500 neighbors-nth-2:bg-red-500 @stuck-top:bg-white">
  </div>

  <!-- Sibling variants -->
  <div
    class="preceding-1:bg-blue-500 preceding-nth-2:bg-green-500 following-3:bg-yellow-500 following-nth-2:bg-purple-500 neighbors-2:bg-pink-500 neighbors-nth-3:bg-orange-500 preceding-[8]:bg-orange-500">
  </div>

  <!-- Custom scrollbar -->
  <div class="custom-scrollbar filter-change-color-[#bea966]"></div>
</body>

</html>
